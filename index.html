<!DOCTYPE html>
<html>
<head>
  <title>Smart Plant Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>🌸 Smart Plant Monitoring System</h1>


  <div class="container">

    <div class="card">
      <h2>Soil Moisture</h2>
      <p id="soil">Loading...</p>
    </div>

    <div class="card">
      <h2>Temperature</h2>
      <p id="temp">Loading...</p>
    </div>

    <div class="card">
      <h2>Humidity</h2>
      <p id="hum">Loading...</p>
    </div>

    <!-- NEW FIELD -->
    <div class="card">
      <h2>Plant Status</h2>
      <p id="status">Loading...</p>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
